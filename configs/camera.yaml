# ==========================================
# 相机配置文件 - 强制指定设备索引模式
# ==========================================

# 1. 相机名称标识
camera_name: "galaxy"

# 2. 设备索引号 (关键修改点)
# Linux下通常自带摄像头是0，外接USB相机通常是1或2
# 如果改成1还是放视频，请尝试改成0或2
index: 0

# 3. 图像参数设置
width: 640        # 图像宽度 (根据你的相机型号调整，MER-139支持1280)
height: 480       # 图像高度
fps: 60           # 帧率

# 4. 曝光与增益 (根据环境光调整)
exposure_ms: 5    # 曝光时间(毫秒)，比赛现场通常设很小(1-5ms)防止拖影
gain: 660.0        # 增益，曝光太低画面黑时可以调大这个

# 5. 其他选项
auto_exposure: false # 关闭自动曝光，保证算法稳定

