# 桌面云台自瞄配置文件 (Task 2A)
enemy_color: "red"

#####-----神经网络参数-----#####
yolo_name: yolo26n
classify_model: assets/tiny_resnet.onnx
yolo26n_model_path: assets/ore_model.xml
yolo11_model_path: assets/yolo11.xml
yolov8_model_path: assets/yolov8.xml
yolov5_model_path: assets/yolov5.xml
device: CPU
min_confidence: 0.8
use_traditional: true

#####-----ROI-----#####
roi:
  x: 420
  y: 50
  width: 600
  height: 600
use_roi: false

#####-----工业相机参数(Galaxy MER-139-210U3C)-----#####
camera_name: "galaxy"
exposure_ms: 10
gain: 28
vid_pid: ""

#####-----传统方法参数-----#####
threshold: 150
max_angle_error: 45 # degree
min_lightbar_ratio: 1.5
max_lightbar_ratio: 20
min_lightbar_length: 8
min_armor_ratio: 1
max_armor_ratio: 5
max_side_ratio: 1.5
max_rectangular_error: 25 # degree
min_confidence: 0.8

#####-----tracker参数-----#####
min_detect_count: 3
max_temp_lost_count: 15
outpost_max_temp_lost_count: 75

#####-----aimer参数-----#####
yaw_offset: -2.5 # degree
pitch_offset: 0  # degree
comming_angle: 70 # degree
leaving_angle: 30 # degree
decision_speed: 7 # rad/s
high_speed_delay_time: 0.066 # s
low_speed_delay_time: 0.015 # s

#####-----shooter参数-----#####
first_tolerance: 5 # 近距离容差加大，桌面测试
second_tolerance: 3 # 远距离容差加大，桌面测试
judge_distance: 2
auto_fire: false # 桌面测试默认不开火

#####-----gimbal串口参数-----#####
com_port: "/dev/gimbal"

#####-----IMU安装矩阵-----#####
R_gimbal2imubody: [1, 0, 0, 0, 1, 0, 0, 0, 1]

#####-----相机标定结果(17mm格子, 10张图, err=0.14px)-----#####
camera_matrix: [1721.9088772086093, 0, 638.64001457489985, 0, 1720.3123565816311, 526.50391640743908, 0, 0, 1]
distort_coeffs: [-0.08489857504240135, 0.1161789526543692, 0.0029370702792296463, 0.00098332786778968818, 0]
R_camera2gimbal: [0, 0, 1, -1, 0, 0, 0, -1, 0]
t_camera2gimbal: [0.1, 0, 0.05]

#####-----桌面调试参数-----#####
test_bullet_speed: 15 # 桌面测试用固定弹速
